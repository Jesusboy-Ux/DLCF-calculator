<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Academic Directorate Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen font-sans">

    <nav class="bg-indigo-900 text-white shadow-md px-6 py-4 flex justify-between items-center">
        <h1 class="font-bold text-lg tracking-wide">Directorate Admin Panel</h1>
        <button id="logoutBtn" onclick="handleLogout()" class="hidden bg-indigo-950 hover:bg-black px-3 py-1.5 rounded text-xs transition">Logout</button>
    </nav>

    <div class="max-w-3xl mx-auto p-4 sm:my-6">

        <section id="authScreen" class="bg-white shadow rounded-2xl p-6 max-w-sm mx-auto">
            <h2 class="text-xl font-bold text-slate-800 mb-1">Admin Login</h2>
            <p class="text-xs text-slate-500 mb-6">This uses the same account system as the student calculator — your account just needs admin access turned on.</p>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">Email Address</label>
                    <input type="email" id="authEmail" placeholder="you@domain.com" class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-indigo-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">Password</label>
                    <input type="password" id="authPassword" placeholder="••••••••" class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-indigo-500">
                </div>
                <p id="authError" class="hidden text-xs text-rose-600 bg-rose-50 border border-rose-100 rounded-lg px-3 py-2"></p>
                <button onclick="submitLogin()" class="w-full bg-indigo-700 hover:bg-indigo-800 text-white text-sm font-medium py-2.5 rounded-lg transition shadow">Login</button>
            </div>
        </section>

        <section id="dashboardScreen" class="hidden space-y-6">
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
                <div class="bg-white rounded-xl border p-4">
                    <p class="text-[11px] text-slate-400 uppercase">Total students</p>
                    <p id="statTotal" class="text-2xl font-bold text-indigo-700 mt-1">0</p>
                </div>
                <div class="bg-white rounded-xl border p-4">
                    <p class="text-[11px] text-slate-400 uppercase">Avg. CGPA</p>
                    <p id="statAvg" class="text-2xl font-bold text-indigo-700 mt-1">0.00</p>
                </div>
                <div class="bg-white rounded-xl border p-4">
                    <p class="text-[11px] text-slate-400 uppercase">Highest CGPA</p>
                    <p id="statHigh" class="text-2xl font-bold text-emerald-600 mt-1">0.00</p>
                </div>
                <div class="bg-white rounded-xl border p-4">
                    <p class="text-[11px] text-slate-400 uppercase">On probation</p>
                    <p id="statProbation" class="text-2xl font-bold text-amber-600 mt-1">0</p>
                </div>
            </div>

            <div class="bg-white rounded-2xl border shadow-sm">
                <div class="p-4 border-b flex items-center justify-between">
                    <h3 class="text-sm font-bold text-slate-700">Students</h3>
                    <input id="searchBox" oninput="renderTable()" placeholder="Search by name or email..." class="text-xs border rounded-lg px-3 py-1.5 w-56">
                </div>
                <div id="studentTable" class="divide-y"></div>
            </div>
        </section>
    </div>

    <script>
        const API_BASE = "http://localhost:4000/api/v1";
        let accessToken = localStorage.getItem("cgpa_admin_token") || null;
        let allStudents = [];

        async function api(path, options = {}) {
            const res = await fetch(`${API_BASE}${path}`, {
                ...options,
                headers: {
                    "Content-Type": "application/json",
                    ...(accessToken ? { Authorization: `Bearer ${accessToken}` } : {}),
                    ...(options.headers || {}),
                },
            });
            const data = await res.json().catch(() => ({}));
            if (!res.ok) throw new Error(data?.error?.message || "Request failed");
            return data;
        }

        function showError(message) {
            const el = document.getElementById('authError');
            el.textContent = message;
            el.classList.remove('hidden');
        }

        async function submitLogin() {
            const email = document.getElementById('authEmail').value.trim();
            const password = document.getElementById('authPassword').value;
            document.getElementById('authError').classList.add('hidden');
            if (!email || !password) return showError("Enter your email and password.");

            try {
                const data = await api("/auth/login", {
                    method: "POST",
                    body: JSON.stringify({ email, password }),
                });
                if (data.user.role !== "ADMIN") {
                    return showError("This account doesn't have admin access.");
                }
                accessToken = data.accessToken;
                localStorage.setItem("cgpa_admin_token", accessToken);
                await loadDashboard();
            } catch (err) {
                showError(err.message);
            }
        }

        window.addEventListener("DOMContentLoaded", async () => {
            if (accessToken) {
                try { await loadDashboard(); }
                catch { accessToken = null; localStorage.removeItem("cgpa_admin_token"); }
            }
        });

        async function loadDashboard() {
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('dashboardScreen').classList.remove('hidden');
            document.getElementById('logoutBtn').classList.remove('hidden');

            const stats = await api("/admin/dashboard");
            document.getElementById('statTotal').textContent = stats.totalStudents;
            document.getElementById('statAvg').textContent = stats.avgCgpa.toFixed(2);
            document.getElementById('statHigh').textContent = stats.highestCgpa.toFixed(2);
            document.getElementById('statProbation').textContent = stats.onProbation;

            const students = await api("/admin/students");
            allStudents = students.data;
            renderTable();
        }

        function renderTable() {
            const q = (document.getElementById('searchBox').value || "").toLowerCase();
            const filtered = allStudents.filter(
                (s) => s.fullName.toLowerCase().includes(q) || s.email.toLowerCase().includes(q)
            );
            const container = document.getElementById('studentTable');
            container.innerHTML = filtered.map((s) => `
                <div class="p-3 flex items-center justify-between text-sm">
                    <div>
                        <p class="font-medium">${s.fullName}</p>
                        <p class="text-xs text-slate-400">${s.email}</p>
                    </div>
                    <span class="font-mono font-bold px-2 py-1 rounded bg-slate-900 text-emerald-400 text-xs">${s.cgpa.toFixed(2)}</span>
                </div>
            `).join('') || `<p class="p-4 text-center text-xs text-slate-400">No students match.</p>`;
        }

        function handleLogout() {
            localStorage.removeItem("cgpa_admin_token");
            location.reload();
        }
    </script>
</body>
</html>
